<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>

    <h1> Calculator </h1>

</header>

<section>

    <div id = "display">
        <p id = "display-value"></p>
    </div>

    <div id = "buttons">
        <button class="num-btn" id="btn-7">7</button>
        <button class="num-btn" id="btn-8">8</button>
        <button class="num-btn" id="btn-9">9</button>
        <button class="btn" id="btn-del">DEL</button>
        <button class="btn" id="btn-clear">C</button>
        


        <button class="num-btn" id="btn-4">4</button>
        <button class="num-btn" id="btn-5">5</button>
        <button class="num-btn" id="btn-6">6</button>
        <button class="op-btn" id="btn-add">+</button>
        <button class="op-btn" id="btn-subtract">-</button>


        <button class="num-btn" id="btn-1">1</button>
        <button class="num-btn" id="btn-2">2</button>
        <button class="num-btn" id="btn-3">3</button>
        <button class="op-btn" id="btn-multiply">*</button>
        <button class="op-btn" id="btn-divide">/</button>
        

        <button class="btn" id="btn-0">0</button>
        <button class="btn" id="btn-decimal">.</button>
        <button class="btn" id="btn-equals">=</button>
        

        

    </div>

</section>

<footer>
    <p>&copy; 2026 Alefe Pereira for The Odin Project</p>
</footer>

<script src="script.js"></script>

</body>
</html>
